<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sesión Cerrada | Sistema Contable</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-white border border-slate-200 rounded-2xl shadow-xl p-8 text-center space-y-6">
        
        <div class="mx-auto w-14 h-14 rounded-full bg-emerald-50 border border-emerald-100 flex items-center justify-center text-emerald-600">
            <i data-lucide="shield-check" class="w-7 h-7"></i>
        </div>

        <div class="space-y-1.5">
            <h2 class="text-base font-bold text-slate-800 tracking-tight">Sesión cerrada de forma segura</h2>
            <p class="text-xs text-slate-400 max-w-xs mx-auto">Gracias por usar el sistema. Tus datos y transacciones han sido resguardados correctamente en la base de datos.</p>
        </div>

        <div class="border-t border-slate-100 my-2"></div>

        <div>
            <a href="{% url 'login' %}" class="w-full inline-flex items-center justify-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-bold px-4 py-3 rounded-xl transition-colors shadow-sm focus:outline-none">
                <i data-lucide="log-in" class="w-4 h-4"></i>
                <span>Volver a iniciar sesión</span>
            </a>
        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
