<!DOCTYPE html>
<html lang="es" class="h-full bg-slate-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Sistema Contable{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        mono: ['JetBrains Mono', 'Fira Code', 'monospace']
                    }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="h-full font-sans text-slate-900 antialiased flex">

    <aside class="w-64 bg-white border-r border-slate-200 flex flex-col justify-between fixed h-full z-10">
        <div>
            <div class="h-16 px-6 border-b border-slate-100 flex items-center gap-3">
                <div class="w-8 h-8 rounded-lg bg-indigo-600 flex items-center justify-center text-white shadow-sm shadow-indigo-200">
                    <i data-lucide="layers" class="w-4 h-4"></i>
                </div>
                <div>
                    <span class="text-sm font-bold tracking-tight text-slate-800 block">Sistema Contable</span>
                    <span class="text-[10px] text-slate-400 font-medium uppercase tracking-wider block"></span>
                </div>
            </div>

            <nav class="p-4 space-y-1">
                <a href="{% url 'plan_cuentas' %}" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-colors {% if request.resolver_match.url_name == 'plan_cuentas' %} bg-indigo-50 text-indigo-600 {% else %} text-slate-600 hover:bg-slate-50 hover:text-slate-900 {% endif %}">
                    <i data-lucide="git-merge" class="w-4 h-4"></i>
                    Plan de Cuentas
                </a>
                <a href="{% url 'libro_diario' %}" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-colors {% if request.resolver_match.url_name == 'libro_diario' %} bg-indigo-50 text-indigo-600 {% else %} text-slate-600 hover:bg-slate-50 hover:text-slate-900 {% endif %}">
                    <i data-lucide="book-open" class="w-4 h-4"></i>
                    Libro Diario
                </a>
                <a href="#" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-slate-400 cursor-not-allowed">
                    <i data-lucide="scale" class="w-4 h-4"></i>
                    Balance General
                </a>
            </nav>
        </div>

        <div class="p-4 border-t border-slate-100 bg-slate-50/50">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-full bg-slate-200 flex items-center justify-center text-slate-600 font-bold text-xs uppercase">
                    MN
                </div>
                <div>
                    <span class="text-xs font-semibold text-slate-700 block">Manuel Navas</span>
                    <span class="text-[10px] text-slate-400 block">Terminal Activa</span>
                </div>
            </div>
        </div>
    </aside>

    <div class="flex-1 pl-64 flex flex-col min-h-screen">
        <header class="h-16 bg-white border-b border-slate-200 px-8 flex items-center justify-between sticky top-0 z-0">
            <h1 class="text-sm font-medium text-slate-500">
                Módulo Contable / <span class="text-slate-800 font-semibold">{% block section_name %}Inicio{% endblock %}</span>
            </h1>
            <div class="flex items-center gap-4 text-xs text-slate-400 font-mono">
                <span>VENV: django-main-thread</span>
                <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
            </div>
        </header>

        <main class="flex-1 p-8">
            {% block content %}
            {% endblock %}
        </main>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
